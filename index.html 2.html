```html id="travelrainfinal"
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Travel Rain</title>

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Arial;
}

body{
 background:#000;
 color:white;
 overflow:hidden;
}

/* HERO (как было "море") */
.hero{
 height:100vh;
 position:relative;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
}

/* затемнение */
.overlay{
 position:absolute;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.5);
}

/* ДОЖДЬ */
.rain{
 position:absolute;
 width:100%;
 height:100%;
 overflow:hidden;
}

.drop{
 position:absolute;
 width:2px;
 height:90px;
 background:rgba(255,255,255,0.25);
 animation:fall linear infinite;
}

@keyframes fall{
 0%{
  transform:translateY(-120vh);
  opacity:0;
 }
 10%{opacity:1;}
 100%{
  transform:translateY(120vh);
  opacity:0;
 }
}

/* КОНТЕНТ */
.content{
 position:relative;
 z-index:2;
}

h1{
 font-size:50px;
 text-shadow:0 0 20px black;
}

p{
 opacity:0.8;
 margin:10px 0 20px;
}

.btn{
 padding:12px 25px;
 border:none;
 background:#00c2ff;
 color:white;
 cursor:pointer;
 border-radius:8px;
 transition:0.3s;
}

.btn:hover{
 background:#ff4757;
 transform:scale(1.1);
}

</style>
</head>

<body>

<section class="hero">

 <!-- ДОЖДЬ -->
 <div class="rain" id="rain"></div>

 <div class="overlay"></div>

 <div class="content">
   <h1>Путешествия под дождём 🌧️</h1>
   <p>Атмосферный туризм</p>
   <button class="btn">Начать</button>
 </div>

</section>

<script>

/* ДОЖДЬ */
const rain = document.getElementById("rain");

for(let i=0;i<140;i++){
 const drop = document.createElement("div");
 drop.classList.add("drop");

 drop.style.left = Math.random()*100 + "vw";
 drop.style.animationDuration = (0.5 + Math.random()*1.5) + "s";
 drop.style.opacity = Math.random();

 rain.appendChild(drop);
}

</script>

</body>
</html>
